version: '3.8'

services:
  bookstore-spa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-spa
    ports:
      - "4200:80"
    environment:
      - NODE_ENV=production
    networks:
      - bookstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bookstore-network:
    driver: bridge
