<mat-toolbar color="primary" class="header-toolbar" role="banner">
  <div class="toolbar-container">
    <div class="logo-section">
      <a routerLink="/books" class="logo-link" data-testid="header-home-link">
        <mat-icon>menu_book</mat-icon>
        <span class="app-title" data-testid="header-app-title">{{ 'app.title' | translate }}</span>
      </a>
    </div>

    <div class="search-section" role="search">
      <mat-form-field appearance="outline" class="search-field">
        <input 
          matInput 
          [formControl]="searchControl"
          [placeholder]="'catalog.search' | translate"
          (keydown.enter)="onSearchSubmit()"
          data-testid="header-search-input"
          [attr.aria-label]="'catalog.search' | translate">
        <mat-icon matPrefix>search</mat-icon>
        @if (searchControl.value) {
          <button 
            matSuffix 
            mat-icon-button 
            (click)="clearSearch()"
            data-testid="header-search-clear"
            [attr.aria-label]="'common.close' | translate">
            <mat-icon>close</mat-icon>
          </button>
        }
      </mat-form-field>
    </div>

    <nav class="toolbar-actions" aria-label="Main navigation">
      <button 
        mat-icon-button 
        routerLink="/cart"
        [matTooltip]="'cart.title' | translate"
        [attr.aria-label]="'cart.title' | translate"
        data-testid="header-cart-btn"
        [matBadge]="(cartItemCount$ | async) || 0"
        [matBadgeHidden]="(cartItemCount$ | async) === 0"
        matBadgeColor="accent">
        <mat-icon>shopping_cart</mat-icon>
      </button>
      <button 
        mat-icon-button 
        [matTooltip]="(isDarkMode$ | async) ? ('header.lightMode' | translate) : ('header.darkMode' | translate)"
        (click)="toggleTheme()"
        [attr.aria-label]="'header.theme' | translate"
        data-testid="header-theme-toggle">
        <mat-icon>{{ (isDarkMode$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button 
        mat-button 
        [matMenuTriggerFor]="languageMenu"
        [attr.aria-label]="'header.language' | translate"
        data-testid="header-lang-toggle">
        <mat-icon>language</mat-icon>
        <span class="language-text">{{ getCurrentLanguageName() }}</span>
      </button>
      <mat-menu #languageMenu="matMenu">
        @for (lang of availableLanguages; track lang.code) {
          <button 
            mat-menu-item 
            (click)="changeLanguage(lang.code)"
            [class.active-language]="currentLang === lang.code"
            [attr.data-testid]="'header-lang-' + lang.code">
            <mat-icon>{{ currentLang === lang.code ? 'check' : '' }}</mat-icon>
            <span>{{ lang.name }}</span>
          </button>
        }
      </mat-menu>

      @if (isAuthenticated$ | async) {
        <button 
          mat-button 
          [matMenuTriggerFor]="userMenu"
          [attr.aria-label]="'header.profile' | translate"
          data-testid="header-user-menu">
          <mat-icon>account_circle</mat-icon>
          @if (user$ | async; as user) {
            <span class="user-name">{{ user.firstName }}</span>
          }
        </button>
        <mat-menu #userMenu="matMenu">
          <button 
            mat-menu-item 
            routerLink="/profile"
            data-testid="header-profile-link">
            <mat-icon>person</mat-icon>
            <span>{{ 'header.profile' | translate }}</span>
          </button>
          <button 
            mat-menu-item 
            routerLink="/orders"
            data-testid="header-orders-link">
            <mat-icon>receipt_long</mat-icon>
            <span>{{ 'header.orders' | translate }}</span>
          </button>
          <mat-divider></mat-divider>
          <button 
            mat-menu-item 
            (click)="logout()"
            data-testid="header-logout-btn">
            <mat-icon>logout</mat-icon>
            <span>{{ 'header.logout' | translate }}</span>
          </button>
        </mat-menu>
      } @else {
        <button 
          mat-button 
          routerLink="/auth/login"
          data-testid="header-login-btn">
          <mat-icon>login</mat-icon>
          <span class="login-text">{{ 'header.login' | translate }}</span>
        </button>
      }
    </nav>
  </div>
</mat-toolbar>
