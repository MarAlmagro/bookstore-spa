<div class="book-filters" data-testid="catalog-filters">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>{{ 'catalog.search' | translate }}</mat-label>
    <input 
      matInput 
      [formControl]="searchControl"
      data-testid="catalog-search-input"
      [attr.aria-label]="'catalog.search' | translate">
    <mat-icon matPrefix>search</mat-icon>
    @if (searchControl.value) {
      <button 
        matSuffix 
        mat-icon-button 
        (click)="searchControl.setValue('')"
        data-testid="catalog-search-clear"
        [attr.aria-label]="'common.close' | translate">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>

  <mat-form-field appearance="outline" class="category-field">
    <mat-label>{{ 'catalog.category' | translate }}</mat-label>
    <mat-select 
      [formControl]="categoryControl"
      data-testid="catalog-category-select"
      [attr.aria-label]="'catalog.category' | translate">
      <mat-option [value]="null">{{ 'catalog.allBooks' | translate }}</mat-option>
      @for (category of categories; track category) {
        <mat-option [value]="category">{{ category }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (hasActiveFilters()) {
    <button 
      mat-stroked-button 
      color="warn"
      (click)="clearFilters()"
      data-testid="catalog-filters-clear"
      class="clear-btn">
      <mat-icon>filter_alt_off</mat-icon>
      {{ 'catalog.filters.clear' | translate }}
    </button>
  }
</div>
