version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular*"
      playwright:
        patterns:
          - "@playwright*"
          - "playwright*"
      jest:
        patterns:
          - "jest*"
          - "@types/jest"
